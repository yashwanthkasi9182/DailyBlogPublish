name: Daily Agentic Dev.to Publish

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC daily — adjust as needed
  workflow_dispatch:        # allows manual trigger from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit history.json back

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agentic publish pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEV_API_KEY }}
        run: python daily_blog_publish.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Update post history [skip ci]"
          git push
